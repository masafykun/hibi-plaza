<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10282d">
  <title>Hibi Plaza Version Archive</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #12262b;
      background: #eef3f1;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      color: #fff;
      background: #10282d;
      border-bottom: 6px solid #f2b53d;
    }
    .header-inner, main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }
    .header-inner {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding: 38px 0 32px;
    }
    .brand {
      margin: 0 0 7px;
      color: #65d2b0;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1;
      letter-spacing: 0;
    }
    .latest-link {
      flex: 0 0 auto;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      border-bottom: 2px solid #f05b43;
      padding: 8px 0;
    }
    main { padding: 42px 0 56px; }
    .versions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }
    article {
      overflow: hidden;
      background: #fff;
      border: 1px solid #cbd8d4;
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(16, 40, 45, 0.08);
    }
    article img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-bottom: 4px solid var(--accent);
    }
    .card-body { padding: 22px; }
    .version {
      margin: 0 0 8px;
      color: #55706f;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    h2 {
      margin: 0 0 18px;
      font-size: 25px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .play {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      color: #fff;
      background: var(--button);
      border-radius: 4px;
      font-weight: 850;
      text-decoration: none;
    }
    .original { --accent: #f2b53d; --button: #b66c09; }
    .blender { --accent: #38a99d; --button: #147c74; }
    .npc { --accent: #f05b43; --button: #d84331; }
    @media (max-width: 820px) {
      .header-inner { align-items: flex-start; flex-direction: column; }
      .versions { grid-template-columns: 1fr; }
      article { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(220px, 0.75fr); }
      article img { height: 100%; aspect-ratio: auto; border-bottom: 0; border-right: 4px solid var(--accent); }
    }
    @media (max-width: 560px) {
      .header-inner, main { width: min(100% - 28px, 1180px); }
      .header-inner { padding: 30px 0 26px; }
      main { padding-top: 28px; }
      article { display: block; }
      article img { height: auto; aspect-ratio: 16 / 10; border-right: 0; border-bottom: 4px solid var(--accent); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <p class="brand">Hibi Plaza</p>
        <h1>Version Archive</h1>
      </div>
      <a class="latest-link" href="../">Latest release</a>
    </div>
  </header>
  <main>
    <section class="versions" aria-label="Playable Hibi Plaza releases">
      <article class="original">
        <img src="previews/original.png" alt="Original Hibi Plaza release">
        <div class="card-body">
          <p class="version">Version 01</p>
          <h2>Original Plaza</h2>
          <a class="play" href="original/">Play original</a>
        </div>
      </article>
      <article class="blender">
        <img src="previews/blender.png" alt="Blender enhanced Hibi Plaza release">
        <div class="card-body">
          <p class="version">Version 02</p>
          <h2>Blender Edition</h2>
          <a class="play" href="blender/">Play Blender edition</a>
        </div>
      </article>
      <article class="npc">
        <img src="previews/npc.png" alt="NPC edition of Hibi Plaza">
        <div class="card-body">
          <p class="version">Version 03</p>
          <h2>NPC Edition</h2>
          <a class="play" href="npc/">Play NPC edition</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
