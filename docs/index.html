<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#17363f">
    <link rel="icon" href="data:,">
    <title>Hibi Plaza</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #17363f;
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      #shell { position: fixed; inset: 0; display: grid; place-items: center; background: #17363f; }
      #unity-canvas { display: block; width: 100vw; height: 100vh; background: #17363f; outline: none; }
      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #17363f;
        z-index: 2;
        transition: opacity 240ms ease;
      }
      #loading.done { opacity: 0; pointer-events: none; }
      .loading-inner { width: min(430px, 76vw); text-align: center; }
      .mark {
        width: 58px;
        height: 58px;
        margin: 0 auto 18px;
        background: #ff6f61;
        border: 9px solid #ffd166;
        transform: rotate(45deg);
      }
      h1 { margin: 0 0 8px; font-size: clamp(34px, 5vw, 58px); letter-spacing: 0; }
      .tag { margin-bottom: 22px; color: #c6e6dd; font-size: 15px; font-weight: 700; }
      .track { height: 6px; background: #315761; overflow: hidden; }
      #progress { width: 0%; height: 100%; background: #ffd166; transition: width 120ms linear; }
      #status { margin-top: 12px; color: #dceeed; font-size: 13px; }
      @media (max-aspect-ratio: 4/3) {
        #unity-canvas { width: 100vw; height: auto; aspect-ratio: 16 / 9; }
      }
    </style>
  </head>
  <body>
    <main id="shell">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    </main>
    <div id="loading">
      <div class="loading-inner">
        <div class="mark"></div>
        <h1>HIBI PLAZA</h1>
        <div class="tag">A PLACE FOR EVERYDAY CONNECTION</div>
        <div class="track"><div id="progress"></div></div>
        <div id="status">Opening the plaza...</div>
      </div>
    </div>
    <script src="Build/WebGL.loader.js"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const loading = document.querySelector("#loading");
      const progress = document.querySelector("#progress");
      const status = document.querySelector("#status");
      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebGL.data.unityweb",
        frameworkUrl: "Build/WebGL.framework.js.unityweb",
        codeUrl: "Build/WebGL.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Masafykun Games",
        productName: "Hibi Plaza",
        productVersion: "0.1.0",
        autoSyncPersistentDataPath: true,
        matchWebGLToCanvasSize: true
      }, (value) => {
        progress.style.width = Math.round(value * 100) + "%";
        status.textContent = value < 0.88 ? "Loading shops and avatars..." : "Joining the plaza...";
      }).then(() => {
        loading.classList.add("done");
        canvas.focus();
      }).catch((message) => {
        status.textContent = "Unable to launch: " + message;
        status.style.color = "#ff998f";
      });
    </script>
  </body>
</html>
